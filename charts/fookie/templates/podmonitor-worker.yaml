{{- if .Values.observability.enabled -}}
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ include "fookie.fullname" . }}-worker
  labels:
    {{- include "fookie.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  selector:
    matchLabels:
      {{- include "fookie.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      interval: 15s
{{- end }}
