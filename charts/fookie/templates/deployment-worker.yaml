apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fookie.fullname" . }}-worker
  labels:
    {{- include "fookie.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  {{- if not .Values.worker.autoscaling.enabled }}
  replicas: {{ .Values.worker.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "fookie.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "fookie.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      containers:
        - name: worker
          image: "{{ .Values.worker.image }}:{{ .Values.worker.tag }}"
          imagePullPolicy: {{ .Values.worker.pullPolicy }}
          command: ["/bin/sh", "-c", "exec /app/worker -db \"$DB_URL\""]
          ports:
            - name: metrics
              containerPort: 9091
              protocol: TCP
          env:
            - name: METRICS_LISTEN
              value: ":9091"
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "fookie.fullname" . }}-database
                  key: url
            - name: SCHEMA_PATH
              value: "{{ .Values.schema.mountPath }}/{{ .Values.schema.fileName }}"
            - name: OTLP_ENDPOINT
              value: {{ .Values.observability.otlpEndpoint | quote }}
            {{- if .Values.redis.enabled }}
            - name: REDIS_URL
              value: "redis://{{ .Release.Name }}-redis-master:6379"
            {{- end }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          {{- if .Values.worker.probes.startup.enabled }}
          startupProbe:
            tcpSocket:
              port: metrics
            initialDelaySeconds: {{ .Values.worker.probes.startup.initialDelaySeconds }}
            periodSeconds: {{ .Values.worker.probes.startup.periodSeconds }}
            failureThreshold: {{ .Values.worker.probes.startup.failureThreshold }}
          {{- end }}
          {{- if .Values.worker.probes.readiness.enabled }}
          readinessProbe:
            tcpSocket:
              port: metrics
            initialDelaySeconds: {{ .Values.worker.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.worker.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.worker.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.worker.probes.readiness.failureThreshold }}
          {{- end }}
          {{- if .Values.worker.probes.liveness.enabled }}
          livenessProbe:
            tcpSocket:
              port: metrics
            initialDelaySeconds: {{ .Values.worker.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.worker.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.worker.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.worker.probes.liveness.failureThreshold }}
          {{- end }}
          volumeMounts:
            - name: schema
              mountPath: {{ .Values.schema.mountPath }}
              readOnly: true
      volumes:
        - name: schema
          configMap:
            name: {{ include "fookie.fullname" . }}-schema
