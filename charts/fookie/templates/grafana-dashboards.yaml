{{- if and .Values.observability.enabled .Values.observability.dashboards.enabled }}
{{- /*
  Mount each Fookie dashboard JSON as a separate ConfigMap so the Grafana
  sidecar (kube-prometheus-stack bundled) auto-discovers them via the
  `grafana_dashboard: "1"` label. The JSON files live in
  deploy/compose/config/grafana/provisioning/dashboards/json and are copied
  into the chart at `files/dashboards/` so they're packaged with the chart.
*/}}
{{- range $path, $_ := .Files.Glob "files/dashboards/*.json" }}
{{- $name := base $path | trimSuffix ".json" }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "fookie.fullname" $ }}-grafana-dash-{{ $name }}
  labels:
    {{- include "fookie.labels" $ | nindent 4 }}
    grafana_dashboard: "1"
data:
  {{ $name }}.json: |-
    {{ $.Files.Get $path | nindent 4 }}
{{- end }}
{{- end }}
