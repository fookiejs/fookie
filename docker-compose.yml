version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: fookie-postgres
    environment:
      POSTGRES_USER: fookie
      POSTGRES_PASSWORD: fookie_dev
      POSTGRES_DB: fookie
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fookie"]
      interval: 10s
      timeout: 5s
      retries: 5

  fookie-server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    container_name: fookie-server
    environment:
      DB_URL: postgres://fookie:fookie_dev@postgres:5432/fookie?sslmode=disable
      PORT: ":8080"
      SCHEMA_PATH: schemas/transaction.fql
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./schemas:/app/schemas:ro
    command: /app/server -schema /app/schemas/transaction.fql -db postgres://fookie:fookie_dev@postgres:5432/fookie

  fookie-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: fookie-worker
    environment:
      DB_URL: postgres://fookie:fookie_dev@postgres:5432/fookie?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    command: /app/worker

volumes:
  postgres_data:
