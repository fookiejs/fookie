services:
  tempo:
    image: grafana/tempo:2.3.1
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./config/tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./config/otel-collector.yaml:/etc/otel-collector.yaml:ro
    ports:
      - "14318:4318"
      - "8889:8889"
    depends_on:
      - tempo

  prometheus:
    image: prom/prometheus:v2.50.1
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus-alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    depends_on:
      - otel-collector

  loki:
    image: grafana/loki:2.9.4
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./config/loki-config.yaml:/etc/loki/config.yaml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"

  promtail:
    image: grafana/promtail:2.9.4
    volumes:
      - ./config/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: ["-config.file=/etc/promtail/config.yml"]
    depends_on:
      - loki

  # ── Exporters — give Grafana cluster-wide visibility ──────────────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    environment:
      # Uses the `grafana_ro` read-only role created by scripts/grafana-bootstrap.sql.
      DATA_SOURCE_NAME: "postgresql://grafana_ro:grafana_ro_dev@postgres:5432/fookie?sslmode=disable"
    ports:
      - "9187:9187"

  redis-exporter:
    image: oliver006/redis_exporter:v1.58.0
    environment:
      REDIS_ADDR: "redis://redis:6379"
    ports:
      - "9121:9121"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8088:8080"
    command:
      - --housekeeping_interval=10s
      - --docker_only=true

  grafana:
    image: grafana/grafana:10.3.1
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_HIDE_LOGIN_FORM: "true"
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: dark
      GF_INSTANCE_NAME: Fookie
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_NEWS_NEWS_FEED_ENABLED: "false"
      GF_HELP_ENABLED: "false"
      GF_EXPLORE_ENABLED: "true"
      GF_LOG_LEVEL: warn
      # Infinity datasource drives the GraphQL explorer dashboard.
      GF_INSTALL_PLUGINS: "yesoreyeram-infinity-datasource,grafana-polystat-panel"
      # Default landing page = Home dashboard (configured as home in preferences).
      GF_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/json/00-home.json
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - loki
      - prometheus
      - tempo

volumes:
  grafana_data:
  prometheus_data:
  loki_data:
  tempo_data:
