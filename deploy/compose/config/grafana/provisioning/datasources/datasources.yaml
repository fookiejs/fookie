apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    uid: loki
    isDefault: true
    jsonData:
      maxLines: 2000

  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    uid: prometheus
    isDefault: false

  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    uid: tempo
    isDefault: false
    jsonData:
      httpMethod: GET
      tracesToLogs:
        datasourceUid: loki
        filterByTraceID: false
        mapTagNamesEnabled: true
        tags:
          - key: container
            value: container

  # ── Fookie Data Hub ──────────────────────────────────────────────────────
  # Read-only PostgreSQL connection: query business data directly from dashboards.
  # The `grafana_ro` user is created by scripts/grafana-bootstrap.sql.
  - name: FookieDB
    type: postgres
    access: proxy
    url: postgres:5432
    database: fookie
    user: grafana_ro
    uid: fookie-db
    isDefault: false
    jsonData:
      sslmode: disable
      postgresVersion: 1500
      timescaledb: false
    secureJsonData:
      password: grafana_ro_dev

  # GraphQL integration via Infinity plugin — eliminates the need for a
  # separate GraphQL Playground. Pre-canned queries live in the
  # graphql-explorer dashboard.
  - name: FookieGraphQL
    type: yesoreyeram-infinity-datasource
    uid: fookie-graphql
    access: proxy
    isDefault: false
    jsonData:
      global_queries: []
      auth_method: none
      allowedHosts:
        - http://fookie-server:8080
        - http://localhost:8080
