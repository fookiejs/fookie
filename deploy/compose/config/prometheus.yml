global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]

  - job_name: fookie-server
    metrics_path: /metrics
    static_configs:
      - targets: ["fookie-server:8080"]

  - job_name: fookie-worker
    metrics_path: /metrics
    static_configs:
      - targets: ["fookie-worker:9091"]

  # ── Cluster exporters ───────────────────────────────────────────────────
  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  # Prometheus scrapes itself so panels can show its own health.
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
