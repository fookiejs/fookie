global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]

  - job_name: fookie-server
    metrics_path: /metrics
    static_configs:
      - targets: ["fookie-server:8080"]

  - job_name: fookie-worker
    metrics_path: /metrics
    static_configs:
      - targets: ["fookie-worker:9091"]
