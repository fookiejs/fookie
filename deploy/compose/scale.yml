# Scale override — removes static port bindings so Docker can start N replicas
# without "address already in use" errors.
#
# Usage (from repo root):
#   docker compose -f demo/docker-compose.yml -f deploy/compose/scale.yml \
#     up --scale fookie-server=3 --scale fookie-worker=5
#
# Traffic reaches the servers via the internal Docker network;
# add a Traefik/Nginx ingress in this file if you need external access.
services:
  fookie-server:
    ports: []

  fookie-worker:
    ports: []
