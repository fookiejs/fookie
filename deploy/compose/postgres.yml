services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: fookie
      POSTGRES_PASSWORD: fookie_dev
      POSTGRES_DB: fookie
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fookie"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
