<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fookie · Live Money Flow</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; background: #0b1220; color: #e6edf7; overflow: hidden; }
  .topbar { display:flex; align-items:center; justify-content:space-between; padding: 10px 20px; background: rgba(13,19,33,.85); border-bottom: 1px solid #1f2a44; }
  .topbar h1 { font-size: 16px; font-weight: 600; letter-spacing: .02em; }
  .topbar .status { font-size: 12px; color: #8fa1bf; }
  .status.connected::before { content:"●"; color:#22c55e; margin-right:6px; }
  .status.disconnected::before { content:"●"; color:#ef4444; margin-right:6px; }

  #world {
    position: relative;
    width: 100vw;
    height: calc(100vh - 52px - 160px);
    background:
      radial-gradient(circle at 30% 20%, rgba(94,234,212,.08), transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(251,191,36,.06), transparent 50%),
      linear-gradient(180deg, #0b1220 0%, #0a0f1a 100%);
    overflow: hidden;
  }

  .user {
    position: absolute;
    transform: translate(-50%, -50%);
    display: flex; flex-direction: column; align-items: center;
    pointer-events: none;
    transition: top .3s ease, left .3s ease;
  }
  .user .dot {
    width: 64px; height: 64px; border-radius: 50%;
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    border: 3px solid #fff2;
    box-shadow: 0 8px 24px rgba(59,130,246,.4);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 700; color: #fff;
  }
  .user .name {
    margin-top: 6px;
    font-size: 12px; color: #c7d2fe;
    background: rgba(12,18,32,.8); padding: 2px 8px; border-radius: 4px;
    white-space: nowrap;
  }
  .user .balance {
    margin-top: 3px;
    font-family: ui-monospace, Menlo, monospace;
    font-size: 13px; font-weight: 600; color: #5eead4;
    background: rgba(12,18,32,.8); padding: 2px 10px; border-radius: 4px;
    transition: background .4s ease, color .4s ease;
    min-width: 70px; text-align: center;
  }
  .user .balance.flash-up { background: rgba(34,197,94,.3); color: #86efac; }
  .user .balance.flash-down { background: rgba(239,68,68,.3); color: #fca5a5; }

  .coin {
    position: absolute;
    z-index: 10;
    font-family: ui-monospace, Menlo, monospace;
    font-size: 12px; font-weight: 700;
    color: #fbbf24;
    background: rgba(251,191,36,.15);
    border: 1px solid rgba(251,191,36,.4);
    padding: 3px 8px; border-radius: 12px;
    transform: translate(-50%, -50%);
    pointer-events: none;
    transition: left 800ms cubic-bezier(.25,.8,.4,1),
                top 800ms cubic-bezier(.25,.8,.4,1),
                opacity 800ms ease;
  }

  #log {
    position: fixed; bottom: 0; left: 0; right: 0; height: 160px;
    background: rgba(8,12,22,.95); border-top: 1px solid #1f2a44;
    padding: 8px 16px; overflow-y: auto;
    font-family: ui-monospace, Menlo, monospace; font-size: 11px;
    color: #94a3b8;
  }
  #log h3 { font-size: 11px; color: #64748b; font-weight: 600; margin-bottom: 6px; letter-spacing: .1em; text-transform: uppercase; }
  .logline { padding: 2px 0; }
  .logline .amt { color: #fbbf24; font-weight: 600; }
  .logline .arrow { color: #64748b; margin: 0 6px; }
  .logline .name { color: #c7d2fe; }
</style>
</head>
<body>

<div class="topbar">
  <h1>🏦 Fookie · Live Money Flow</h1>
  <div class="status disconnected" id="status">connecting…</div>
</div>

<div id="world"></div>

<div id="log">
  <h3>Recent Transfers</h3>
  <div id="loglines"></div>
</div>

<script>
(() => {
  const world = document.getElementById('world');
  const logLines = document.getElementById('loglines');
  const statusEl = document.getElementById('status');

  // wallet_id -> { userEl, balanceEl, nameEl, x, y, name, userId, walletId, balance }
  const byWallet = new Map();
  // user_id -> same
  const byUser = new Map();

  function setStatus(ok, text) {
    statusEl.className = 'status ' + (ok ? 'connected' : 'disconnected');
    statusEl.textContent = text;
  }

  function fmtMoney(n) {
    if (n == null || isNaN(n)) return '—';
    const v = Number(n);
    if (v >= 1e6) return '$' + (v/1e6).toFixed(2) + 'M';
    if (v >= 1e3) return '$' + (v/1e3).toFixed(1) + 'k';
    return '$' + v.toFixed(0);
  }

  let placedCount = 0;
  function placeUser(user, wallet) {
    // Ignore backend world_x/y (seeds cluster them). Use a fixed grid so
    // users never overlap. Grid sized to current viewport.
    const W = world.clientWidth;
    const H = world.clientHeight;
    const CELL_W = 140, CELL_H = 110;
    const cols = Math.max(1, Math.floor((W - 40) / CELL_W));
    const idx = placedCount++;
    const col = idx % cols;
    const row = Math.floor(idx / cols);
    const x = 40 + col * CELL_W + CELL_W / 2;
    const y = 60 + row * CELL_H + CELL_H / 2;

    const el = document.createElement('div');
    el.className = 'user';
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    el.innerHTML = `
      <div class="dot">${(user.display_name || '?').charAt(0).toUpperCase()}</div>
      <div class="name">${escapeHtml(user.display_name || '')}</div>
      <div class="balance">${fmtMoney(wallet && wallet.balance)}</div>
    `;
    world.appendChild(el);

    const entry = {
      userEl: el,
      balanceEl: el.querySelector('.balance'),
      nameEl: el.querySelector('.name'),
      dotEl: el.querySelector('.dot'),
      x, y,
      name: user.display_name || '',
      userId: user.id,
      walletId: user.wallet_id || (wallet && wallet.id),
      balance: wallet ? Number(wallet.balance) : null,
    };
    byUser.set(user.id, entry);
    if (entry.walletId) byWallet.set(entry.walletId, entry);
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function flashBalance(walletId, newBalance) {
    const entry = byWallet.get(walletId);
    if (!entry) return;
    const prev = entry.balance;
    const next = Number(newBalance);
    entry.balance = next;
    entry.balanceEl.textContent = fmtMoney(next);
    if (prev != null && !isNaN(prev)) {
      const cls = next >= prev ? 'flash-up' : 'flash-down';
      entry.balanceEl.classList.add(cls);
      setTimeout(() => entry.balanceEl.classList.remove(cls), 500);
    }
  }

  function animateTransfer(body) {
    const from = byWallet.get(body.from_wallet_id);
    const to   = byWallet.get(body.to_wallet_id);
    if (!from || !to) return;

    const coin = document.createElement('div');
    coin.className = 'coin';
    coin.textContent = '💰 ' + fmtMoney(body.amount);
    coin.style.left = from.x + 'px';
    coin.style.top  = (from.y - 20) + 'px';
    coin.style.opacity = '1';
    world.appendChild(coin);

    // Kick off transition on next frame
    requestAnimationFrame(() => {
      coin.style.left = to.x + 'px';
      coin.style.top  = (to.y - 20) + 'px';
    });
    // Fade near the end
    setTimeout(() => { coin.style.opacity = '0'; }, 700);
    setTimeout(() => coin.remove(), 900);

    // Log line
    const line = document.createElement('div');
    line.className = 'logline';
    line.innerHTML = `<span class="name">${escapeHtml(from.name)}</span><span class="arrow">→</span><span class="name">${escapeHtml(to.name)}</span> <span class="amt">${fmtMoney(body.amount)}</span>`;
    logLines.prepend(line);
    while (logLines.childElementCount > 20) logLines.lastElementChild.remove();
  }

  async function gqlQuery(query) {
    const res = await fetch('/graphql', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'admin_key': 'demo' },
      body: JSON.stringify({ query }),
    });
    const j = await res.json();
    return j.data || {};
  }

  async function loadInitial() {
    try {
      const data = await gqlQuery('{ all_bank_user { id display_name wallet_id world_x world_y } all_bank_wallet { id balance } }');
      const users = data.all_bank_user || [];
      const wallets = data.all_bank_wallet || [];
      const walletById = new Map();
      for (const w of wallets) walletById.set(w.id, w);
      for (const u of users) placeUser(u, walletById.get(u.wallet_id));
    } catch (e) {
      console.error('initial load failed', e);
    }
  }

  async function streamSubscription(query, onEvent) {
    while (true) {
      try {
        const res = await fetch('/graphql', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'admin_key': 'demo', 'X-Fookie-Admin-Key': 'demo' },
          body: JSON.stringify({ query }),
        });
        if (!res.ok || !res.body) throw new Error('bad response ' + res.status);
        setStatus(true, 'live');
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buf = '';
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          let nl;
          while ((nl = buf.indexOf('\n')) >= 0) {
            const line = buf.slice(0, nl).trim();
            buf = buf.slice(nl + 1);
            if (!line) continue;
            try { onEvent(JSON.parse(line)); } catch (e) { console.warn('parse', e, line); }
          }
        }
      } catch (e) {
        console.warn('stream error, reconnecting', e);
      }
      setStatus(false, 'reconnecting…');
      await new Promise(r => setTimeout(r, 1500));
    }
  }

  function startStreams() {
    streamSubscription(
      'subscription { entity_events(model: "WalletTransfer") { op id payload_json } }',
      (m) => {
        const ev = m.data?.entity_events;
        if (!ev || ev.op !== 'created') return;
        let body; try { body = JSON.parse(ev.payload_json || '{}'); } catch { return; }
        animateTransfer(body);
      },
    );
    streamSubscription(
      'subscription { entity_events(model: "BankWallet") { op id payload_json } }',
      (m) => {
        const ev = m.data?.entity_events;
        if (!ev || ev.op !== 'updated') return;
        let body; try { body = JSON.parse(ev.payload_json || '{}'); } catch { return; }
        flashBalance(ev.id, body.balance);
      },
    );
    streamSubscription(
      'subscription { entity_events(model: "BankUser") { op id payload_json } }',
      async (m) => {
        const ev = m.data?.entity_events;
        if (!ev || ev.op !== 'created') return;
        // Re-fetch this user + its wallet to place it
        try {
          const d = await gqlQuery(`{ all_bank_user { id display_name wallet_id world_x world_y } all_bank_wallet { id balance } }`);
          const users = d.all_bank_user || [];
          const wallets = d.all_bank_wallet || [];
          const wm = new Map(wallets.map(w => [w.id, w]));
          for (const u of users) {
            if (!byUser.has(u.id)) placeUser(u, wm.get(u.wallet_id));
          }
        } catch {}
      },
    );
  }

  loadInitial().then(startStreams);
})();
</script>
</body>
</html>
